<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Eternal Stone Bible</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b1220;
        color: #e7eaf0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui,
          sans-serif;
        padding: 24px;
        text-align: center;
      }
      .logo {
        font-size: 48px;
      }
      h1 {
        font-size: 24px;
        margin: 10px 0 6px;
      }
      p {
        color: #aab3c5;
        max-width: 380px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">📖</div>
      <h1>Eternal Stone Bible</h1>
      <p id="blurb">
        This page only opens the reading-plan and study links the app shares. Ask
        whoever invited you to send you a link.
      </p>
    </main>
    <script>
      (function () {
        var es = (navigator.language || "en").toLowerCase().indexOf("es") === 0;
        if (es) {
          document.documentElement.lang = "es";
          document.getElementById("blurb").textContent =
            "Esta página solo abre los enlaces de planes y estudios que la app " +
            "comparte. Pídele a quien te invitó que te pase un enlace.";
        }
      })();
    </script>
  </body>
</html>
